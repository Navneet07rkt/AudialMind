
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; my_features.conf
;; Custom feature extraction config for AudialMind
;; Author: Navneet
;;
;; Components wired:
;;   1. cWaveSource     → reads .wav file
;;   2. cFramer         → frames signal (50ms window)
;;   3. cWindower       → applies Hamming window
;;   4. cTransformFFT   → computes FFT
;;   5. cMfcc           → extracts 20 MFCC coefficients
;;   6. cPitchShs       → extracts pitch (F0)
;;   7. cFunctionals    → computes statistical functionals
;;   8. cCsvSink        → writes output to CSV
;;
;; Key differences from eGeMAPSv02:
;;   - Frame size: 50ms  (eGeMAPS uses 20ms)
;;   - Hop size  : 15ms  (eGeMAPS uses 10ms)
;;   - MFCCs     : 20    (eGeMAPS uses 4)
;;   - Added ZCR feature group
;;   - Added Spectral Flux
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;; ── Component Manager ─────────────────────────────
[componentInstances:cComponentManager]
instance[dataMemory].type = cDataMemory

;; List all components in order
instance[waveSource].type    = cWaveSource
instance[framer].type        = cFramer
instance[windower].type      = cWindower
instance[fft].type           = cTransformFFT
instance[fftmag].type        = cFFTmagphase
instance[mfcc].type          = cMfcc
instance[pitch].type         = cPitchShs
instance[zcr].type           = cZcr
instance[spectral].type      = cSpectral
instance[functionals].type   = cFunctionals
instance[csvSink].type       = cCsvSink

;; ── Wave Source ───────────────────────────────────
[waveSource:cWaveSource]
writer.dmLevel = wave
filename       = \cm[inputfile(I){test.wav}:input file name]
monoMixdown    = 1

;; ── Framer (50ms frame, 15ms hop) ────────────────
[framer:cFramer]
reader.dmLevel  = wave
writer.dmLevel  = frames
frameSize       = 0.050
frameStep       = 0.015
frameCenterSpecial = left

;; ── Windower (Hamming window) ─────────────────────
[windower:cWindower]
reader.dmLevel  = frames
writer.dmLevel  = windowed
winFunc         = ham
gain            = 1.0

;; ── FFT ──────────────────────────────────────────
[fft:cTransformFFT]
reader.dmLevel  = windowed
writer.dmLevel  = fft

;; ── FFT Magnitude ─────────────────────────────────
[fftmag:cFFTmagphase]
reader.dmLevel  = fft
writer.dmLevel  = fftmag

;; ── MFCC (20 coefficients) ────────────────────────
;; eGeMAPSv02 only uses 4 MFCCs
;; We use 20 for richer spectral representation
[mfcc:cMfcc]
reader.dmLevel  = fftmag
writer.dmLevel  = mfcc
firstMfcc       = 1
lastMfcc        = 20
cepLifter       = 22
htkcompatible   = 0

;; ── Pitch / F0 (SHS method) ──────────────────────
[pitch:cPitchShs]
reader.dmLevel  = fftmag
writer.dmLevel  = pitch
maxPitch        = 620
minPitch        = 52
nCandidates     = 4
scores          = 1
voicing         = 1
F0              = 1

;; ── Zero Crossing Rate ────────────────────────────
;; Not in eGeMAPSv02 — captures noisiness/voicing
[zcr:cZcr]
reader.dmLevel  = frames
writer.dmLevel  = zcr
normalize       = 1

;; ── Spectral Features (flux, centroid, etc.) ─────
[spectral:cSpectral]
reader.dmLevel  = fftmag
writer.dmLevel  = spectral
bands[0]        = 0
bands[1]        = 650
bands[2]        = 1000
bands[3]        = 4000
bands[4]        = 8000
flux            = 1
centroid        = 1
entropy         = 1
rollOff[0]      = 0.85
rollOff[1]      = 0.95

;; ── Functionals (mean, std, etc.) ─────────────────
[functionals:cFunctionals]
reader.dmLevel   = mfcc;pitch;zcr;spectral
writer.dmLevel   = functionals
frameMode        = full
frameSize        = 0
frameStep        = 0
functionalsEnabled = Means;Variances;Peaks;Percentiles;Regression

Means.enabled    = 1
Variances.enabled = 1
Peaks.enabled    = 1
Percentiles.enabled = 1
Percentiles.percentile[0] = 0.2
Percentiles.percentile[1] = 0.5
Percentiles.percentile[2] = 0.8
Regression.enabled = 1
Regression.linregc1 = 1
Regression.linregc2 = 1
Regression.linregerr = 1

;; ── CSV Sink ──────────────────────────────────────
[csvSink:cCsvSink]
reader.dmLevel  = functionals
filename        = \cm[outputfile(O){output.csv}:output csv file]
append          = 0
delimChar       = ,
header          = 1
